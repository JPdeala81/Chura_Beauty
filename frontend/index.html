<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Chura Beauty Salon - Réservation de Services de Beauté en ligne" />
    <title>Chura Beauty Salon - Réservation de Services de Beauté</title>

    <!-- Prevent FOUC (Flash of Unstyled Content) - CRITICAL -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        background: #ffffff;
        color: #1a0f08;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #ffffff 0%, #f9f9f9 100%);
        font-size: 14px;
        line-height: 1.5;
      }
      .loading {
        text-align: center;
        color: #6c757d;
        padding: 20px;
      }
      /* Block rendering until JS loads */
      html {
        display: block;
      }
    </style>

    <!-- Block rendering script - ensures CSS loads before content renders -->
    <script>
      document.documentElement.style.display = 'block';
    </script>

    <!-- Preload critical fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- DNS prefetch for API -->
    <link rel="dns-prefetch" href="https://chura-beauty-backend.vercel.app" />
  </head>
  <body>
    <div id="root">
      <div class="loading">⏳ Chargement en cours...</div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
